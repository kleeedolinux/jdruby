name: Build and Release Experimental

on:
  workflow_dispatch:
    inputs:
      build_target:
        description: 'Build target'
        required: true
        default: 'linux'
        type: choice
        options:
          - linux
      build_profile:
        description: 'Build profile'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      optimization_level:
        description: 'Optimization level (for release builds)'
        required: false
        default: '0'
        type: choice
        options:
          - '0' # No optimization
          - '1' # Basic optimization
          - '2' # More optimization
          - '3' # Full optimization
          - 's' # Size optimization
          - 'z' # Minimal size optimization
      skip_tests:
        description: 'Skip tests for faster builds'
        required: false
        default: true
        type: boolean
      skip_lints:
        description: 'Skip formatting and clippy checks'
        required: false
        default: true
        type: boolean

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    name: Build and Release for Linux
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install LLVM
        run: |
          sudo apt-get update
          sudo apt-get install -y wget software-properties-common
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-21 main" -y
          sudo apt-get update
          sudo apt-get install -y llvm-21 llvm-21-dev clang-21 libpolly-21-dev libllvm-21-ocaml-dev
          sudo update-alternatives --install /usr/bin/llvm-config llvm-config /usr/bin/llvm-config-21 100
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-21 100

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Generate random version
        id: version
        run: |
          # Generate random alphabet string (8 characters)
          RANDOM_ALPHA=$(LC_ALL=C tr -dc 'a-z' < /dev/urandom | head -c 8)
          
          # List of random names for combination
          NAMES=("melissa" "melo" "anny" "gravity" "newton" "niestzche" "pluton" "miki" "matsubara" "matz" "ruby" "emerald" "crystal" "instable" "singularity" "wormhole")
          
          # Select 1-2 random names
          NAME_COUNT=$((RANDOM % 2 + 1))
          SELECTED_NAMES=()
          for i in $(seq 1 $NAME_COUNT); do
            INDEX=$((RANDOM % ${#NAMES[@]}))
            SELECTED_NAMES+=("${NAMES[$INDEX]}")
          done
          
          # Combine names with hyphen
          NAME_PART=$(IFS=-; echo "${SELECTED_NAMES[*]}")
          
          # Final version: v(RANDOM)-(NAME)
          VERSION="v${RANDOM_ALPHA}-${NAME_PART}"
          
          echo "Generated version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Format Check
        run: echo "Skipping format check for experimental builds"
        if: ${{ inputs.skip_lints == 'false' }}

      - name: Clippy Lints
        run: cargo clippy --all-targets --all-features -- -D warnings
        if: ${{ inputs.skip_lints == 'false' }}

      - name: Build with Profile
        run: |
          if [ "${{ inputs.build_profile }}" = "debug" ]; then
            echo "Building debug profile..."
            LLVM_SYS_211_PREFIX=/usr/lib/llvm-21 cargo build --verbose
          else
            echo "Building release profile with optimization level ${{ inputs.optimization_level }}..."
            # Set optimization level via environment variable
            export CARGO_PROFILE_RELEASE_OPT_LEVEL="${{ inputs.optimization_level }}"
            LLVM_SYS_211_PREFIX=/usr/lib/llvm-21 cargo build --release --verbose
          fi

      - name: Run Tests
        run: LLVM_SYS_211_PREFIX=/usr/lib/llvm-21 cargo test --verbose
        if: ${{ inputs.skip_tests == 'false' }}

      - name: Create release archive
        run: |
          mkdir -p release
          
          # Determine target directory based on build profile
          TARGET_DIR="target/${{ inputs.build_profile }}"
          if [ "${{ inputs.build_profile }}" = "debug" ]; then
            echo "Using debug build directory: $TARGET_DIR"
          else
            echo "Using release build directory: $TARGET_DIR"
          fi
          
          # Try to find jdruby binary first
          if [ -f "$TARGET_DIR/jdruby" ]; then
            cp "$TARGET_DIR/jdruby" release/
            echo "Found jdruby binary"
          else
            echo "jdruby binary not found, looking for other binaries..."
            # Find any binary files in target directory
            find "$TARGET_DIR" -type f -executable -not -path "*/examples/*" -not -name "*.d" -not -name "*.rlib" | head -10 | while read file; do
              cp "$file" release/
              echo "Copied: $(basename $file)"
            done
          fi
          
          # Create archive
          tar -czf jdruby-${{ steps.version.outputs.version }}-linux.tar.gz -C release .
          
          # List what's in the archive for debugging
          echo "Archive contents:"
          tar -tzf jdruby-${{ steps.version.outputs.version }}-linux.tar.gz

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: JDRuby ${{ steps.version.outputs.version }}
          body: |
            ## Experimental Release: JDRuby ${{ steps.version.outputs.version }}
            
            WARNING: This is an EXPERIMENTAL build for testing purposes only!
            
            Build Configuration:
            - Profile: ${{ inputs.build_profile }}
            - Optimization: ${{ inputs.build_profile == 'release' && inputs.optimization_level || 'N/A (debug)' }}
            - Tests: ${{ inputs.skip_tests == 'false' && 'Passed' || 'Skipped' }}
            - Lints: ${{ inputs.skip_lints == 'false' && 'Passed' || 'Skipped' }}
            
            This release may contain:
            - Unstable features
            - Breaking changes
            - Performance issues
            - Incomplete functionality
            - Debug symbols (if debug build)
            
            Use at your own risk!
            
            What's included:
            - Full native Ruby compiler and runtime implemented in Rust
            - LLVM-based code generation
            - Just-in-time compilation support
            - Foreign function interface
            
            Installation (for testers only):
            1. Download jdruby-${{ steps.version.outputs.version }}-linux.tar.gz
            2. Extract: tar -xzf jdruby-${{ steps.version.outputs.version }}-linux.tar.gz
            3. Run: ./jdruby your_script.rb
            
            System Requirements:
            - Linux x86_64
            - glibc 2.17 or later
            
            ---
            Experimental build from commit: ${{ github.sha }}
            Status: Testing Only
          files: |
            jdruby-${{ steps.version.outputs.version }}-linux.tar.gz
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
