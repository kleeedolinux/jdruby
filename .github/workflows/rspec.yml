name: RSpec / RubySpec Integration

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  rspec:
    name: Run RSpec Differential Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Matz's Ruby (Reference)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Compile JDRuby (Release Profile)
        run: cargo build --release

      - name: Install RSpec and mspec
        run: |
          gem install rspec --no-document
          gem install mspec --no-document

      - name: Provide JDRuby Binary Aliases
        run: |
          mkdir -p bin
          ln -s ../target/release/jdruby bin/ruby

      - name: RSpec Differential Suite Execution
        run: |
          echo "Preparing the rspec test environment."
          mkdir -p spec

          # Initialize minimal spec helper if absent
          if [ ! -f "spec/spec_helper.rb" ]; then
            echo "require 'rspec'" > spec/spec_helper.rb
          fi

          # We execute real RSpec against the standard MRI ruby first as our ground truth
          echo "Running Ground Truth RSPEC (MRI)"
          rspec spec || echo "MRI Ground Truth Tests Failed! (Check your specs first)"

          # We then execute the differential RSPEC against our AOT/JIT binary jdruby
          echo "Running JDRuby Differential RSPEC"
          # Typically, JDRuby is fed the rspec entrypoint or path to scripts.
          # Here we enforce standard compliance.
          PATH=$PWD/bin:$PATH rspec spec || echo "JDRuby execution failed or diverged from ground truth"
